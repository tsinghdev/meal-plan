<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meal Plan">
<title>Weekly Meal Plan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1e1e24;--surface:#2a2a32;--surfaceHover:#32323c;
  --border:#3a3a45;--borderLight:#2f2f3a;
  --text:#e0ddd8;--textMuted:#9a9690;--textDim:#706c66;
  --accent:#7ca8d4;--accentBg:#1e2d3d;
  --green:#6fcf97;--greenBg:#1e3a2f;
  --red:#e07070;--redBg:#3a2020;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:700}
.header p{font-size:11px;color:var(--textMuted);margin-top:2px}
.week-selector{display:flex;gap:6px;padding:12px 16px;background:var(--bg);position:sticky;top:50px;z-index:9;border-bottom:1px solid var(--border)}
.week-btn{flex:1;padding:8px 0;text-align:center;font-size:12px;font-weight:600;color:var(--textMuted);background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer}
.week-btn.active{color:var(--accent);background:var(--accentBg);border-color:var(--accent)}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:98px;z-index:10}
.tab-btn{flex:1;padding:8px 0;text-align:center;font-size:11px;font-weight:500;color:var(--textMuted);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer}
.tab-btn.active{color:var(--accent);background:var(--accentBg);border-bottom-color:var(--accent)}
.tab-btn .icon{font-size:16px;display:block;margin-bottom:2px}
.content{padding:16px;padding-bottom:80px;max-width:520px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.card-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:none;background:none;width:100%;text-align:left;color:var(--text)}
.day-name{font-size:14px;font-weight:600}
.tag{display:inline-block;margin-top:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.shop-tag{padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;background:var(--redBg);color:var(--red)}
.arrow{color:var(--textDim);font-size:16px}
.card-body{padding:0 16px 16px;border-top:1px solid var(--borderLight);display:none}
.card-body.open{display:block}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--textMuted);margin:12px 0 8px}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:13px}
.task-dot{color:var(--textDim);margin-top:1px}
.meal-row{display:flex;gap:8px;margin-bottom:6px}
.meal-label{font-size:11px;font-weight:500;color:var(--textMuted);width:48px;flex-shrink:0;padding-top:2px}
.meal-text{font-size:13px}
.progress-bar{background:var(--accentBg);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.progress-bar span{font-size:13px;font-weight:500;color:var(--accent)}
.progress-bar .count{font-weight:700}
.grocery-cat-header{padding:12px 16px;border-bottom:1px solid var(--borderLight);font-size:14px;font-weight:600}
.grocery-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--borderLight);cursor:pointer;border-left:none;border-right:none;border-top:none;background:none;width:100%;text-align:left;color:var(--text)}
.grocery-item:last-child{border-bottom:none}
.checkbox{width:20px;height:20px;border-radius:6px;border:2px solid var(--textDim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;transition:all 0.15s}
.checkbox.checked{background:var(--green);border-color:var(--green);color:var(--bg)}
.grocery-text{font-size:13px;transition:all 0.15s}
.grocery-text.checked{color:var(--textDim);text-decoration:line-through}
.recipe-meta{display:flex;gap:12px;margin-top:4px}
.recipe-meta span{font-size:11px;color:var(--textMuted)}
.step{display:flex;gap:12px;margin-bottom:8px}
.step-num{font-size:11px;font-weight:700;color:var(--accent);width:16px;flex-shrink:0;padding-top:2px}
.step-text{font-size:13px}
.nutrient-name{font-size:14px;font-weight:600}
.nutrient-src{font-size:11px;color:var(--textMuted);margin-top:2px}
.tab-content{display:none}
.tab-content.active{display:block}
</style>
</head>

  <h1>4-Week Meal Plan</h1>

  <button class="week-btn" data-week="3" onclick="switchWeek(3)">Week 3</button>

  recipes: [

      steps:["Preheat oven to 180°C / 350°F.","Sauté diced peppers, zucchini, and onion in an oven-safe pan, 5 min.","Whisk 10 eggs with salt, pepper, and crumbled goat cheese.","Pour eggs over the veg in the pan. Scatter cherry tomatoes on top.","Cook on stovetop 3 min until edges set.","Transfer to oven. Bake 15–18 min until golden and set in centre."]},

const nutrients = [
  { name:"Folate", sources:"Lentils, kale, spinach, black beans, chickpeas, arugula" },
  { name:"Omega-3s", sources:"Salmon, sardines, mackerel, walnuts" },
  { name:"Zinc", sources:"Chicken, turkey, pumpkin seeds, lentils, chickpeas" },
  { name:"Iron", sources:"Lentils, black beans, spinach, kale, quinoa" },
  { name:"Vitamin D", sources:"Salmon, sardines, mackerel, eggs" },
  { name:"Vitamin B12", sources:"Salmon, mackerel, sardines, eggs, chicken, turkey" },
  { name:"Vitamin C", sources:"Bell peppers, tomatoes, lemon, kale, broccoli" },
  { name:"Vitamin E", sources:"Nuts, seeds, olive oil, avocado" },
  { name:"Selenium", sources:"Eggs, chicken, turkey, brown rice" },
  { name:"Choline", sources:"Eggs, chicken, cod, salmon" },
  { name:"Antioxidants", sources:"Beets, berries, kale, sweet potato, colourful peppers" },
  { name:"Fiber", sources:"Lentils, black beans, chickpeas, sweet potato, quinoa" }
];

let currentWeek = 1;
let currentTab = "schedule";
let checkedItems = {};

function switchWeek(w) {
  currentWeek = w;
  checkedItems = {};
  document.querySelectorAll('.week-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.week) === w);
  });
  render();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

function render() {
  const el = document.getElementById('app-content');
  const week = WEEKS[currentWeek];
  if (currentTab === 'schedule') el.innerHTML = renderSchedule(week.schedule);
  else if (currentTab === 'grocery') el.innerHTML = renderGrocery(week.grocery);
  else if (currentTab === 'recipes') el.innerHTML = renderRecipes(week.recipes);
  else if (currentTab === 'nutrients') el.innerHTML = renderNutrients();
}

function renderSchedule(days) {
  return days.map((d, i) => `
    <div class="card">
      <button class="card-header" onclick="toggleCard(this)">
        <div>
          <div class="day-name">${d.day}</div>
          <span class="tag" style="background:${d.tagBg};color:${d.tagText}">${d.tag}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${d.shop ? '<span class="shop-tag">🛒 Shop</span>' : ''}
          <span class="arrow">▼</span>
        </div>
      </button>
      <div class="card-body">
        <div class="section-label">Tasks</div>
        ${d.tasks.map(t => `<div class="task-item"><span class="task-dot">•</span>${t}</div>`).join('')}
        <div class="section-label">Meals</div>
        <div class="meal-row"><span class="meal-label">Lunch</span><span class="meal-text">${d.meals.lunch}</span></div>
        <div class="meal-row"><span class="meal-label">Dinner</span><span class="meal-text">${d.meals.dinner}</span></div>
      </div>
    </div>
  `).join('');
}

function renderGrocery(cats) {
  const total = cats.reduce((s, c) => s + c.items.length, 0);
  const checked = Object.keys(checkedItems).filter(k => k.startsWith('w'+currentWeek) && checkedItems[k]).length;
  return `
    <div class="progress-bar">
      <span>Shopping progress</span>
      <span class="count">${checked} / ${total} items</span>
    </div>
    ${cats.map(cat => `
      <div class="card">
        <div class="grocery-cat-header">${cat.icon} ${cat.name}</div>
        ${cat.items.map((item, i) => {
          const key = 'w'+currentWeek+'-'+cat.name+'-'+i;
          const ch = checkedItems[key];
          return `<button class="grocery-item" onclick="toggleGrocery('${key}', this)">
            <div class="checkbox ${ch ? 'checked' : ''}">${ch ? '✓' : ''}</div>
            <span class="grocery-text ${ch ? 'checked' : ''}">${item}</span>
          </button>`;
        }).join('')}
      </div>
    `).join('')}
  `;
}

function renderRecipes(recs) {
  return recs.map(r => `
    <div class="card">
      <button class="card-header" onclick="toggleCard(this)">
        <div>
          <div class="day-name">${r.name}</div>
          <div class="recipe-meta">
            <span>📅 ${r.cookDay}</span>
            <span>⏱ ${r.time}</span>
            <span>🍽 ${r.serves}</span>
          </div>
        </div>
        <span class="arrow">▼</span>
      </button>
      <div class="card-body">
        ${r.steps.map((s, i) => `<div class="step"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></div>`).join('')}
      </div>
    </div>
  `).join('');
}

function renderNutrients() {
  return `
    <p style="font-size:11px;color:var(--textMuted);margin-bottom:12px">Key nutrients covered across all 4 weeks.</p>
    ${nutrients.map(n => `
      <div class="card" style="margin-bottom:8px">
        <div style="padding:12px 16px">
          <div class="nutrient-name">${n.name}</div>
          <div class="nutrient-src">${n.sources}</div>
        </div>
      </div>
    `).join('')}
  `;
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.arrow');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  arrow.textContent = isOpen ? '▼' : '▲';
}

function toggleGrocery(key, btn) {
  checkedItems[key] = !checkedItems[key];
  render();
}

// Initial render
render();
</script>
